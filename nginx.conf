# ============================================================
# STMS — Nginx Reverse Proxy Configuration
# ============================================================
# Letakkan di: /etc/nginx/sites-available/stms
# lalu: ln -s /etc/nginx/sites-available/stms /etc/nginx/sites-enabled/
# ============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name stms.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stms.example.com;

    # SSL — ganti dengan domain asli
    ssl_certificate     /etc/letsencrypt/live/stms.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stms.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size (uploads)
    client_max_body_size 20M;

    # ── Storage Files ──────────────────────────────────────
    location /storage/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static files
        location ~* \.(pdf|jpg|jpeg|png|gif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Static Assets (Frontend) ───────────────────────────
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA — Fallback to index.html ───────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # ── Logging ────────────────────────────────────────────
    access_log /var/log/nginx/stms-access.log;
    error_log  /var/log/nginx/stms-error.log warn;
}
